global:
  resolve_timeout: 5m

route:
  receiver: default
  group_by: [alertname, service]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h

receivers:
  - name: default
    # Intentionally empty — alerts are silently dropped until the sre-agent
    # webhook receiver is added in Task 12.
    webhook_configs: []
