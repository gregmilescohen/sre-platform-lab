name: pulseboard-api CI

on:
  push:
    branches: [main]
    paths: ["apps/pulseboard-api/**"]
  pull_request:
    branches: [main]
    paths: ["apps/pulseboard-api/**"]

jobs:
  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.claude/actions/python-app-lint
        with:
          working-directory: apps/pulseboard-api

  test:
    name: test
    runs-on: ubuntu-latest
    permissions:
      checks: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: ./.claude/actions/python-app-test
        with:
          app-name: pulseboard-api
          working-directory: apps/pulseboard-api
          codecov-token: ${{ secrets.CODECOV_TOKEN }}
