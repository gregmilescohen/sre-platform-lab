name: pulseboard-api CI

on:
  push:
    branches: [main]
    paths: ["apps/pulseboard-api/**"]
  pull_request:
    branches: [main]
    paths: ["apps/pulseboard-api/**"]

jobs:
  lint:
    name: lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/pulseboard-api
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
      - run: uv sync --group dev
      - run: uv run ruff check .
      - run: uv run ruff format --check .

  test:
    name: test
    runs-on: ubuntu-latest
    permissions:
      checks: write
      contents: read
    defaults:
      run:
        working-directory: apps/pulseboard-api
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
      - run: uv sync --group dev
      - run: uv run pytest tests/ -v --junitxml=junit.xml --cov=app --cov-report=xml
      - uses: dorny/test-reporter@v1
        if: always()
        with:
          name: pulseboard-api tests
          path: apps/pulseboard-api/junit.xml
          reporter: java-junit
      - uses: codecov/codecov-action@v4
        if: always()
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: apps/pulseboard-api/coverage.xml
          flags: pulseboard-api
          fail_ci_if_error: false
