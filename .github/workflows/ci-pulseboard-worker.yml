name: pulseboard-worker CI

on:
  push:
    branches: [main]
    paths: ["apps/pulseboard-worker/**"]
  pull_request:
    branches: [main]
    paths: ["apps/pulseboard-worker/**"]

jobs:
  ci:
    uses: ./.github/workflows/python-app-ci.yml
    with:
      app-name: pulseboard-worker
      working-directory: apps/pulseboard-worker
    secrets:
      codecov-token: ${{ secrets.CODECOV_TOKEN }}
