name: Python App Test
description: pytest with JUnit report, coverage, test-reporter, and Codecov upload.

inputs:
  app-name:
    description: App name — used for test report labels and Codecov flags (e.g., pulseboard-api)
    required: true
  working-directory:
    description: Path to the app relative to the repo root (e.g., apps/pulseboard-api)
    required: true
  codecov-token:
    description: Codecov upload token
    required: true

runs:
  using: composite
  steps:
    - uses: astral-sh/setup-uv@v4

    - name: Install dependencies
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: uv sync --group dev

    - name: Test
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: uv run pytest tests/ -v --junitxml=junit.xml --cov=app --cov-report=xml

    - uses: dorny/test-reporter@v1
      if: always()
      with:
        name: ${{ inputs.app-name }} tests
        path: ${{ inputs.working-directory }}/junit.xml
        reporter: java-junit

    - uses: codecov/codecov-action@v4
      if: always()
      with:
        token: ${{ inputs.codecov-token }}
        files: ${{ inputs.working-directory }}/coverage.xml
        flags: ${{ inputs.app-name }}
        fail_ci_if_error: false
