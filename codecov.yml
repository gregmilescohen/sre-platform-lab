flags:
  pulseboard-shared:
    paths:
      - apps/lib/pulseboard_shared/
  pulseboard-api:
    paths:
      - apps/pulseboard-api/app/
  pulseboard-worker:
    paths:
      - apps/pulseboard-worker/app/
  pulseboard-consumer:
    paths:
      - apps/pulseboard-consumer/app/
  pulseboard-ui:
    paths:
      - apps/pulseboard-ui/src/
  sre-agent:
    paths:
      - sre-agent/agent/

coverage:
  status:
    patch:
      default:
        target: 90%
        threshold: 5%
