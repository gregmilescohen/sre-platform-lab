# Services added incrementally per task:
# Task 2:  prometheus, grafana, loki, alloy, alertmanager
# Task 3:  postgres, pubsub-emulator, pubsub-setup, pulseboard-api
# Task 4:  pulseboard-worker
# Task 5:  pulseboard-consumer
# Task 6:  pulseboard-ui
# Task 7:  otel-collector, tempo
# Task 12: sre-agent

services:
  prometheus:
    image: prom/prometheus:v2.51.2
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./infra/prometheus/rules:/etc/prometheus/rules:ro
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.enable-lifecycle'
      - '--web.enable-admin-api'
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9090/-/healthy"]
      interval: 10s
      timeout: 5s
      retries: 5
    depends_on:
      alertmanager:
        condition: service_healthy
    restart: unless-stopped

  grafana:
    image: grafana/grafana:10.4.3
    container_name: grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
      # Anonymous viewer access required for Grafana MCP server (Task 11)
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
    volumes:
      - ./infra/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./infra/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    depends_on:
      prometheus:
        condition: service_healthy
      loki:
        condition: service_healthy
    restart: unless-stopped

  loki:
    image: grafana/loki:2.9.8
    container_name: loki
    ports:
      - "3100:3100"
    volumes:
      - ./infra/loki/loki-config.yml:/etc/loki/local-config.yaml:ro
      - loki-data:/loki
    command: -config.file=/etc/loki/local-config.yaml
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3100/ready"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  alloy:
    image: grafana/alloy:v1.2.1
    container_name: alloy
    ports:
      - "12345:12345"
    volumes:
      - ./infra/alloy/config.alloy:/etc/alloy/config.alloy:ro
      # Note: on Linux hosts, the docker group GID may differ. If Alloy fails to
      # read logs, add `group_add: ["<docker-gid>"]` matching your host's docker GID.
      - /var/run/docker.sock:/var/run/docker.sock:ro
    command: run --server.http.listen-addr=0.0.0.0:12345 /etc/alloy/config.alloy
    depends_on:
      loki:
        condition: service_healthy
    restart: unless-stopped

  alertmanager:
    image: prom/alertmanager:v0.27.0
    container_name: alertmanager
    ports:
      - "9093:9093"
    volumes:
      - ./infra/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9093/-/healthy"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  postgres:
    image: postgres:15-alpine
    container_name: postgres
    environment:
      POSTGRES_USER: pulseboard
      POSTGRES_PASSWORD: pulseboard
      POSTGRES_DB: pulseboard
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pulseboard"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  pubsub-emulator:
    image: gcr.io/google.com/cloudsdktool/google-cloud-cli:emulators
    container_name: pubsub-emulator
    command:
      - gcloud
      - beta
      - emulators
      - pubsub
      - start
      - --host-port=0.0.0.0:8085
      - --project=pulseboard
    ports:
      - "8085:8085"
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8085"]
      interval: 5s
      timeout: 3s
      retries: 15
    restart: unless-stopped

  pubsub-setup:
    image: curlimages/curl:8.7.1
    container_name: pubsub-setup
    depends_on:
      pubsub-emulator:
        condition: service_healthy
    command:
      - sh
      - -c
      - |
        curl -sf -X PUT "http://pubsub-emulator:8085/v1/projects/pulseboard/topics/pulseboard-events" || true
        curl -sf -X PUT "http://pubsub-emulator:8085/v1/projects/pulseboard/subscriptions/pulseboard-events-sub" \
          -H "Content-Type: application/json" \
          -d '{"topic":"projects/pulseboard/topics/pulseboard-events"}' || true
        echo "Pub/Sub setup complete."
    restart: "no"

  pulseboard-api:
    build:
      context: ./apps/pulseboard-api
      dockerfile: Dockerfile
    container_name: pulseboard-api
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: postgresql://pulseboard:pulseboard@postgres:5432/pulseboard
      PUBSUB_EMULATOR_HOST: pubsub-emulator:8085
      PUBSUB_PROJECT_ID: pulseboard
      PUBSUB_TOPIC_ID: pulseboard-events
    depends_on:
      postgres:
        condition: service_healthy
      pubsub-setup:
        condition: service_completed_successfully
    restart: unless-stopped
    develop:
      watch:
        - action: sync+restart
          path: ./apps/pulseboard-api/app
          target: /app/app
        - action: rebuild
          path: ./apps/pulseboard-api/pyproject.toml
        - action: rebuild
          path: ./apps/pulseboard-api/uv.lock

  pulseboard-worker:
    build:
      context: ./apps/pulseboard-worker
      dockerfile: Dockerfile
    container_name: pulseboard-worker
    environment:
      PUBSUB_EMULATOR_HOST: pubsub-emulator:8085
      PUBSUB_PROJECT_ID: pulseboard
      PUBSUB_TOPIC_ID: pulseboard-events
      PUBLISH_INTERVAL_SECONDS: "1.0"
      BATCH_SIZE: "5"
    depends_on:
      pubsub-setup:
        condition: service_completed_successfully
    restart: unless-stopped
    develop:
      watch:
        - action: sync+restart
          path: ./apps/pulseboard-worker/app
          target: /app/app
        - action: rebuild
          path: ./apps/pulseboard-worker/pyproject.toml
        - action: rebuild
          path: ./apps/pulseboard-worker/uv.lock

  pulseboard-consumer:
    build:
      context: ./apps/pulseboard-consumer
      dockerfile: Dockerfile
    container_name: pulseboard-consumer
    ports:
      - "9102:9102"
    environment:
      DATABASE_URL: postgresql://pulseboard:pulseboard@postgres:5432/pulseboard
      PUBSUB_EMULATOR_HOST: pubsub-emulator:8085
      PUBSUB_PROJECT_ID: pulseboard
      PUBSUB_SUBSCRIPTION_ID: pulseboard-events-sub
      METRICS_PORT: "9102"
    depends_on:
      postgres:
        condition: service_healthy
      pubsub-setup:
        condition: service_completed_successfully
    restart: unless-stopped
    develop:
      watch:
        - action: sync+restart
          path: ./apps/pulseboard-consumer/app
          target: /app/app
        - action: rebuild
          path: ./apps/pulseboard-consumer/pyproject.toml
        - action: rebuild
          path: ./apps/pulseboard-consumer/uv.lock

  pulseboard-ui:
    build:
      context: ./apps/pulseboard-ui
      dockerfile: Dockerfile
    container_name: pulseboard-ui
    ports:
      - "5173:5173"
    depends_on:
      - pulseboard-api
    restart: unless-stopped
    develop:
      watch:
        - action: rebuild
          path: ./apps/pulseboard-ui/src
        - action: rebuild
          path: ./apps/pulseboard-ui/package.json
        - action: rebuild
          path: ./apps/pulseboard-ui/package-lock.json

volumes:
  prometheus-data:
  grafana-data:
  loki-data:
  postgres-data:
